apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-github-app.fullname" . }}-service
  labels:
  {{- include "my-github-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: github-demo-app
    {{- include "my-github-app.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.service.ports | toYaml | nindent 2 }}
